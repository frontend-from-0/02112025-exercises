<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Create User</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <header>
      <h1>Create User</h1>
      <a href="./index.html" class="button">← Back</a>
    </header>

    <main>
      <form id="createForm">
        <label for="firstName">First Name</label>
        <input id="firstName" type="text" required aria-label="First Name" />

        <label for="lastName">Last Name</label>
        <input id="lastName" type="text" required aria-label="Last Name" />

        <button type="submit" class="button button--success">
          Create User
        </button>
      </form>
    </main>
    <div id="modal" class="modal hidden">
      <div class="modal-content">
        <p id="modalMessage"></p>
        <button id="modalClose" class="button button--success">OK</button>
      </div>
    </div>

    <script src="./js/ui.js"></script>
    <script src="./js/create.js"></script>
  </body>
</html>
