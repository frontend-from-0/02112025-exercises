<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Appointment Booking</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Book an Appointment</h1>
      </header>

      <form class="booking">
        <section class="calendar">
          <label for="date">Select a date</label>
          <input type="date" id="date" />
          <h2 id="timeslots-heading">Available Time Slots</h2>
          <fieldset class="timeslots" aria-labelledby="timeslots-heading">
            <legend class="hidden">Choose a time slot</legend>
            <button class="slot" type="button" aria-label="Select 09:00 time slot">10:30</button>
            <button class="slot" type="button" aria-label="Select 13:00 time slot">13:00</button>
            <button class="slot" type="button" aria-label="Select 14:30 time slot">14:30</button>
            <button class="slot" type="button" aria-label="Select 16:00 time slot">16:00</button>
          </fieldset>
          <label for="name" id="name">Full name</label>
          <input type="text" id="name-text"/>   
          <label for="E-Mail" id="e-mail">E-Mail</label>
          <input type="text" id="email-text"/>
        </section>
        <aside class="summary">
          <h2>Your Appointment</h2>
          <p>Fullname: <span id="entered-name">-</span></p>
          <p>E-Mail Adress: <span id="entered-email">-</span></p>
          <p>Date: <span id="selected-date">-</span></p>
          <p>Time: <span id="selected-time">-</span></p>
          <button id="confirm" type="submit" disabled>Confirm Booking</button>
        </aside>

        <div id="confirmation">
          <div class="voucher-head">
             <h2>Confirmation Voucher</h2>
             <div id="close-btn">&times;</div>
          </div>
          <div id="customer-info"></div>
        </div>
      </form>
    </div>

    <script src="script.js"></script>
  </body>
</html>
