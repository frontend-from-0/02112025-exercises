<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Appointment Booking</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Book an Appointment</h1>
        <p class="subtitle">
          Complete your appointment easily in just a few steps.
        </p>
      </header>

      <form class="booking">
        <section class="calendar">
          <label for="username">User Name</label>
          <input
            class="form-input"
            type="text"
            id="username"
            name="username"
            placeholder="Please enter your user name."
          />
          <label for="email">Email Address</label>
          <input
            class="form-input"
            type="email"
            id="email"
            name="email"
            placeholder="Enter your email address. (example@gmail.com)"
            aria-describedby="errorMsg"
          />
          <p id="errorMsg">
            Invalid Email Address
          </p>
          <label for="date">Select a date</label>
          <input type="date" id="date" class="form-input"/>
          <h2 id="timeslots-heading">Available Time Slots</h2>
          <fieldset class="timeslots" aria-labelledby="timeslots-heading">
            <legend class="hidden">Choose a time slot</legend>
            <button
              class="slot"
              type="button"
              aria-label="Select 09:00 time slot"
            >
              10:30
            </button>
            <button
              class="slot"
              type="button"
              aria-label="Select 13:00 time slot"
            >
              13:00
            </button>
            <button
              class="slot"
              type="button"
              aria-label="Select 14:30 time slot"
            >
              14:30
            </button>
            <button
              class="slot"
              type="button"
              aria-label="Select 16:00 time slot"
            >
              16:00
            </button>
          </fieldset>
        </section>

        <aside class="summary">
          <h2>Your Appointment</h2>
          <p>User Name: <span id="entered-username"></span></p>
          <p>Email Address: <span id="entered-email"></span></p>
          <p>Date: <span id="selected-date">-</span></p>
          <p>Time: <span id="selected-time">-</span></p>
          <button id="confirm" type="submit" disabled>Confirm Booking</button>
        </aside>
      </form>
    </div>

    <script src="script.js"></script>
  </body>
</html>
