<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form Validation</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main>
      <form novalidate id="checkoutForm" method="post">
        <div class="heading">
          <h1 class="title">You’re so close! 🚀</h1>
          <p class="description">
            Confirm your contact and payment details to complete your purchase.
            Once you hit <strong>"Place Order"</strong>, we’ll handle everything
            else!
          </p>
        </div>
        <div class="input-group">
          <label for="email">Email</label>
          <input
            id="email"
            type="email"
            placeholder="email@example.com"
            name="email"
            autocomplete="email"
            aria-describedby="emailError"
            required
          />
          <p
            id="emailError"
            class="input-error hidden"
            role="alert"
            aria-live="polite"
          ></p>
        </div>
        <div class="input-group">
          <label for="phone">Phone</label>
          <input
            id="phone"
            type="tel"
            placeholder="555 123 4567"
            name="phoneNumber"
            autocomplete="tel"
            aria-describedby="phoneError"
            required
          />
          <p
            id="phoneError"
            class="input-error hidden"
            role="alert"
            aria-live="polite"
          ></p>
        </div>
        <div class="input-group">
          <label for="firstName">First Name</label>
          <input
            id="firstName"
            type="text"
            placeholder="Sophia"
            name="firstname"
            autocomplete="given-name"
            aria-describedby="firstNameError"
            required
          />
          <p
            id="firstNameError"
            class="input-error hidden"
            role="alert"
            aria-live="polite"
          ></p>
        </div>
        <div class="input-group">
          <label for="lastName">Last Name</label>
          <input
            id="lastName"
            type="text"
            placeholder="Clark"
            name="lastName"
            autocomplete="family-name"
            aria-describedby="lastNameError"
            required
          />
          <p
            id="lastNameError"
            class="input-error hidden"
            role="alert"
            aria-live="polite"
          ></p>
        </div>
        <fieldset>
          <legend>Final Step: Payment</legend>

          <div class="input-group">
            <label for="cardnumber">Card Number</label>
            <div class="card-input-container">
              <div class="visa-master-card">
                <img
                  src="assets/visa-logo.svg"
                  class="visa-card-icon"
                  alt=""
                  aria-hidden="true"
                  width="35"
                />
                <img
                  src="assets/master-logo.svg"
                  class="master-card-icon"
                  alt=""
                  aria-hidden="true"
                  width="35"
                />
              </div>
              <input
                id="cardNumber"
                type="text"
                placeholder="1234 5678 9101 1121"
                name="cardnumber"
                autocomplete="cc-number"
                required
                maxlength="19"
              />
            </div>
            <p
              id="cardNumberError"
              class="input-error hidden"
              role="alert"
              aria-live="polite"
            ></p>
          </div>
          <div class="input-group">
            <label for="expDate">Expiration Date</label>
            <input
              id="expDate"
              type="text"
              placeholder="MM/YY"
              name="expDate"
              autocomplete="cc-exp"
              required
            />
            <p
              id="expDateError"
              class="input-error hidden"
              role="alert"
              aria-live="polite"
            ></p>
          </div>
          <div class="input-group">
            <label for="cvv">CVV</label>
            <input
              id="cvv"
              type="text"
              placeholder="123"
              name="cvv"
              autocomplete="cc-csc"
              required
            />
            <p
              id="cvvError"
              class="input-error hidden"
              role="alert"
              aria-live="polite"
            ></p>
          </div>
        </fieldset>
        <button type="submit" class="btn-success">Place Order</button>
      </form>
      <div
        class="hidden"
        id="success"
        role="status"
        aria-live="polite"
        tabindex="-1"
      >
        <div class="success-msg">
          <img
            src="assets/heart.svg"
            id="heart-icon"
            class="heart-icon"
            alt=""
            aria-hidden="true"
            width="200"
          />
          <h2>Payment Successful! ✨</h2>
          <p class="success-subtitle">
            Thanks for shopping with us!<br />Check your inbox for the
            confirmation email.
          </p>
        </div>
      </div>
    </main>
    <script src="script.js"></script>
  </body>
</html>
