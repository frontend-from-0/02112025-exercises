<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form Validation</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
    <form novalidate id="checkoutForm"  method="post">
      <div class="input-group">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          placeholder="email@example.com"
          name="email"
          autocomplete="email"
          aria-describedby="emailError"
        />
        <p id="emailError" class="input-error hidden" role="alert" aria-live="polite"></p>
      </div>
      <div class="input-group">
        <label for="phone">Phone</label>
        <input
          id="phone"
          type="tel"
          placeholder="555 123 4567"
          name="phoneNumber"
          autocomplete="tel"
          aria-describedby="phoneError"
        />
        <p id="phoneError" class="input-error hidden" role="alert" aria-live="polite"></p>
      </div>
      <div class="input-group">
        <label for="firstName">First Name</label>
        <input
          id="firstName"
          type="text"
          placeholder="Sophia"
          name="firstname"
        autocomplete="given-name"
        aria-describedby="firstNameError"
        />
        <p id="firstNameError" class="input-error hidden" role="alert" aria-live="polite"></p>
      </div>
      <div class="input-group">
        <label for="lastname">Last Name</label>
        <input 
        id="lastname" 
        type="text" 
        placeholder="Clark" 
        name="lastname"
        autocomplete="family-name" 
        aria-describedby="lastNameError"
        />
        <p id="lastNameError" class="input-error hidden" role="alert" aria-live="polite"></p>
      </div>
<fieldset>
  <legend>Your Card Informations</legend>

      <div class="input-group">
        <label for="cardnumber">Card Number</label>
        <input
          id="cardnumber"
          type="text"
          placeholder="1234 5678 9101 1121"
          name="cardnumber"
          autocomplete="cc-number"
        />
        <p id="cardNumberError" class="input-error hidden" role="alert" aria-live="polite"></p>
      </div>
      <div class="input-group">
        <label for="expDate">Expiration Date</label>
        <input 
        id="expDate" 
        type="text" 
        placeholder="MM/YY" 
        name="expDate"
        autocomplete="cc-exp" 
        />
        <p id="expDateError" class="input-error hidden" role="alert" aria-live="polite"></p>
      </div>
      <div class="input-group">
        <label for="cvv">CVV</label>
        <input id="cvv" type="text" placeholder="123" name="cvv" autocomplete="cc-csc" />
        <p id="cvvError" class="input-error hidden" role="alert" aria-live="polite"></p>
      </div>
      </fieldset>
      <button type="submit" class="btn-success">Place Order</button>
    </form>
    <div class="hidden" id="success" role="status" aria-live="polite">
      <p>Success!</p>
    </div>
    </main>
    <script src="./script.js"></script>
  </body>
</html>
