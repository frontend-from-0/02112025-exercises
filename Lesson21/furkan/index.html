<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form Validation</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <h1>Checkout</h1>
      <form novalidate id="checkoutForm" method="post">
        <div class="input-group">
          <label for="firstName">First Name</label>
          <input
            id="firstName"
            type="text"
            placeholder="Sophia"
            name="firstname"
            aria-describedby="firstNameError"
            required
          />
          <p id="firstNameError" class="input-error hidden"></p>
        </div>
        <div class="input-group">
          <label for="lastname">Last Name</label>
          <input
            id="lastname"
            type="text"
            placeholder="Clark"
            name="lastname"
            aria-describedby="lastNameError"
            required
          />
          <p id="lastnameError" class="input-error hidden"></p>
        </div>

        <div class="input-group">
          <label for="email">Email</label>
          <input
            id="email"
            type="email"
            placeholder="email@example.com"
            name="email"
            aria-describedby="emailError"
            required
          />
          <p id="emailError" class="input-error hidden"></p>
        </div>
        <div class="input-group">
          <label for="phone">Phone</label>
          <input
            id="phone"
            type="tel"
            placeholder="555 123 4567"
            name="phoneNumber"
            aria-describedby="phoneError"
            required
          />
          <p id="phoneError" class="input-error hidden"></p>
        </div>

        <div class="input-group">
          <label for="cardnumber">Card Number</label>
          <input
            id="cardnumber"
            type="text"
            placeholder="1234 5678 9101 1121"
            name="cardnumber"
            aria-describedby="cardNumberError"
            required
          />
          <p id="cardnumberError" class="input-error hidden"></p>
        </div>
        <div class="input-group">
          <label for="expDate">Expiration Date</label>
          <input id="expDate" type="text" placeholder="MM/YY" name="expDate" aria-describedby="expDateError"
            required/>
          <p id="expDateError" class="input-error hidden"></p>
        </div>
        <div class="input-group">
          <label for="cvv">CVV</label>
          <input
            id="cvv"
            type="text"
            placeholder="123"
            name="cvv"
            maxlength="4"
            aria-describedby="cvvError"
            required
          />
          <p id="cvvError" class="input-error hidden"></p>
        </div>
        <button type="submit" class="btn-success">Place Order</button>
      </form>
      <div class="hidden" id="success">
        <p>Success!</p>
      </div>
    </main>
    <script src="./script.js"></script>
  </body>
</html>
